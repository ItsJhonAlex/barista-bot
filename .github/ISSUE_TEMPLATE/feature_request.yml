name: Feature request
description: Suggest an idea or improvement for Barista
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem does this solve? Who benefits and when?
      placeholder: As an operator, I want ... so that ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the feature or change you'd like to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed and why you set them aside.
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - "module (new or existing)"
        - "dashboard / UI"
        - "api"
        - "bot / Gateway"
        - "core / module system"
        - "data / schema"
        - "other"
    validations:
      required: true
  - type: checkboxes
    id: scope-check
    attributes:
      label: Scope check
      options:
        - label: This does not require selfbots or user-account automation (against Discord ToS).
          required: true
